<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene">
    <section class="calculator" aria-label="Calculatrice" data-mode="simple">
      <header class="calc-header">
        <div>
          <p class="calc-kicker">Calculatrice</p>
          <h1>Simple et Scientifique</h1>
        </div>
        <div class="header-controls">
          <div class="mode-switch" role="group" aria-label="Choix du mode">
            <button class="mode-btn is-active" type="button" data-mode-target="simple">Simple</button>
            <button class="mode-btn" type="button" data-mode-target="scientific">Scientifique</button>
          </div>
          <button class="theme-toggle" type="button" aria-label="Activer le mode sombre" data-theme-toggle>
            Dark
          </button>
        </div>
      </header>

      <div class="display-wrap" role="status" aria-live="polite">
        <button class="result-copy" type="button" data-action="copy-result" aria-label="Copier le résultat">
          Copier
        </button>
        <p class="expression">0</p>
        <p class="result">0</p>
      </div>

      <div class="memory-bar" aria-label="Mémoire">
        <button class="memory-btn" type="button" data-action="memory-clear">MC</button>
        <button class="memory-btn" type="button" data-action="memory-recall">MR</button>
        <button class="memory-btn" type="button" data-action="memory-add">M+</button>
        <button class="memory-btn" type="button" data-action="memory-subtract">M-</button>
      </div>

      <div class="keys scientific-keys" aria-label="Touches scientifiques">
        <button class="key key-sci" type="button" data-action="func" data-value="sin">sin</button>
        <button class="key key-sci" type="button" data-action="func" data-value="cos">cos</button>
        <button class="key key-sci" type="button" data-action="func" data-value="tan">tan</button>
        <button class="key key-sci" type="button" data-action="deg">DEG</button>

        <button class="key key-sci" type="button" data-action="func" data-value="asin">asin</button>
        <button class="key key-sci" type="button" data-action="func" data-value="acos">acos</button>
        <button class="key key-sci" type="button" data-action="func" data-value="atan">atan</button>
        <button class="key key-soft" type="button" data-action="percent">%</button>

        <button class="key key-sci" type="button" data-action="func" data-value="ln">ln</button>
        <button class="key key-sci" type="button" data-action="func" data-value="log">log</button>
        <button class="key key-sci" type="button" data-action="sqrt">sqrt</button>
        <button class="key key-sci" type="button" data-action="pow2">x<sup>2</sup></button>

        <button class="key key-sci" type="button" data-action="left-paren">(</button>
        <button class="key key-sci" type="button" data-action="right-paren">)</button>
        <button class="key key-sci" type="button" data-action="const" data-value="PI">pi</button>
        <button class="key key-sci" type="button" data-action="const" data-value="E">e</button>

        <button class="key key-sci" type="button" data-action="inv">1/x</button>
        <button class="key key-sci" type="button" data-action="op" data-value="^">x<sup>y</sup></button>
        <button class="key key-sci" type="button" data-action="backspace">DEL</button>
      </div>

      <div class="keys basic-keys" aria-label="Touches principales">
        <button class="key key-soft" type="button" data-action="clear">AC</button>
        <button class="key key-soft" type="button" data-action="backspace">DEL</button>
        <button class="key key-soft" type="button" data-action="toggle-sign">+/-</button>
        <button class="key key-op" type="button" data-action="op" data-value="/">/</button>

        <button class="key" type="button" data-action="digit" data-value="7">7</button>
        <button class="key" type="button" data-action="digit" data-value="8">8</button>
        <button class="key" type="button" data-action="digit" data-value="9">9</button>
        <button class="key key-op" type="button" data-action="op" data-value="*">*</button>

        <button class="key" type="button" data-action="digit" data-value="4">4</button>
        <button class="key" type="button" data-action="digit" data-value="5">5</button>
        <button class="key" type="button" data-action="digit" data-value="6">6</button>
        <button class="key key-op" type="button" data-action="op" data-value="-">-</button>

        <button class="key" type="button" data-action="digit" data-value="1">1</button>
        <button class="key" type="button" data-action="digit" data-value="2">2</button>
        <button class="key" type="button" data-action="digit" data-value="3">3</button>
        <button class="key key-op" type="button" data-action="op" data-value="+">+</button>

        <button class="key key-zero" type="button" data-action="digit" data-value="0">0</button>
        <button class="key" type="button" data-action="dot">.</button>
        <button class="key key-eq" type="button" data-action="equals">=</button>
      </div>

      <section class="history-panel" aria-label="Historique des calculs">
        <div class="history-header">
          <p>Historique</p>
          <button class="history-clear" type="button" data-action="history-clear">Vider</button>
        </div>
        <ul class="history-list" data-history-list></ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
